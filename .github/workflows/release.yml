name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cross-compile binaries
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile.cross
          build-args: VERSION=${{ github.ref_name }}
          target: artifacts
          outputs: type=local,dest=${{ runner.temp }}/dist

      - name: Create archives
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p release

          for plat in linux-amd64 linux-arm64; do
            dir="release/$plat"
            mkdir -p "$dir"
            cp "${{ runner.temp }}/dist/$plat/legacy-miner" "$dir/"
            cp LICENSE.md "$dir/"
            cp README.md "$dir/"
            tar czf "release/legacy-miner-${VERSION}-${plat}.tar.gz" -C "$dir" .
            sha256sum "release/legacy-miner-${VERSION}-${plat}.tar.gz" >> release/SHA256SUMS.txt
          done

          dir="release/windows-amd64"
          mkdir -p "$dir"
          cp "${{ runner.temp }}/dist/windows-amd64/legacy-miner.exe" "$dir/"
          cp LICENSE.md "$dir/"
          cp README.md "$dir/"
          (cd "$dir" && zip -r  "../legacy-miner-${VERSION}-windows-amd64.zip" .)
          sha256sum "release/legacy-miner-${VERSION}-windows-amd64.zip" >> release/SHA256SUMS.txt

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## LegacyCoin Standalone CPU Miner ${{ github.ref_name }}

            ### Downloads
            - `legacy-miner-${{ github.ref_name }}-linux-amd64.tar.gz` — Linux x86-64
            - `legacy-miner-${{ github.ref_name }}-linux-arm64.tar.gz` — Linux ARM64
            - `legacy-miner-${{ github.ref_name }}-windows-amd64.zip` — Windows x86-64
          files: |
            release/*
          fail_on_unmatched_files: true
